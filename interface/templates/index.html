<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathDistill — Math Problem Solver</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <span class="logo">&#x221E; MathDistill</span>
        <span class="subtitle">Step-by-step math reasoning</span>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="welcome">
        <p>Ask any math problem and the model will reason through it step by step.</p>
        <div class="examples">
          <span>Try:</span>
          <button class="example-btn" onclick="fillExample(this)">Janet's ducks lay 16 eggs per day. She eats 3 for breakfast and bakes 4 into muffins. She sells the remainder for $2 each. How much does she make per day?</button>
          <button class="example-btn" onclick="fillExample(this)">If a train travels 60 mph for 2.5 hours, how far does it go?</button>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <form class="input-form" id="inputForm">
        <textarea
          id="questionInput"
          class="question-input"
          placeholder="Type your math problem here..."
          rows="2"
          autofocus
        ></textarea>
        <button type="submit" class="send-btn" id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
